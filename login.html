<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - AnyPrint Store</title>
    <meta name="description" content="Login to your AnyPrint account to manage orders and wishlist." />
    <meta property="og:title" content="Login - AnyPrint Store" />
    <meta property="og:type" content="website" />
    <link rel="icon" href="data:;base64,iVBORw0KGgo=" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Sora:wght@400;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <header class="site-header">
        <div class="container nav-wrap">
            <div class="brand">
                <h1 class="brand-title"><a class="brand-link" href="index.html">AnyPrint</a></h1>
                <p class="brand-tag">Account</p>
            </div>
            <div class="top-actions">
                <a class="plain-btn" href="index.html">Back to Shop</a>
            </div>
        </div>
    </header>

    <main class="container page-shell checkout-page">
        <div class="page-intro">
            <p class="page-kicker">Account access</p>
            <h2 class="page-title">Login</h2>
            <p class="page-lead">Sign in to keep your order history, checkout faster, and resume shopping where you left off.</p>
        </div>

        <section class="checkout-card panel-card pad auth-card-shell">
            <h2>Login</h2>
            <div id="authState" class="auth-state"></div>

            <form id="loginForm" class="checkout-form" novalidate>
                <label for="loginUsername">Username</label>
                <input id="loginUsername" name="username" placeholder="Username" autocomplete="username" required />
                <p id="loginUsernameError" class="field-error"></p>
                <label for="loginPassword">Password</label>
                <input id="loginPassword" name="password" type="password" placeholder="Password" autocomplete="current-password" required />
                <p id="loginPasswordError" class="field-error"></p>
                <p class="form-link"><a href="forgot-password.html">Forgot Password?</a></p>
                <p id="loginError" class="inline-error" role="alert" aria-live="assertive"></p>
                <button type="submit" class="btn">Login</button>
            </form>

            <div class="social-auth-shell">
                <p class="social-auth-divider"><span>or sign in with</span></p>
                <div class="social-auth-actions">
                    <button id="googleLoginButton" class="btn social google provider-btn" type="button">
                        <span class="auth-logo google-logo" aria-hidden="true">G</span>
                        <span>Continue with Google</span>
                    </button>
                    <button id="facebookLoginButton" class="btn social facebook provider-btn" type="button">
                        <span class="auth-logo facebook-logo" aria-hidden="true">f</span>
                        <span>Continue with Facebook</span>
                    </button>
                </div>
                <p id="socialAuthError" class="inline-error" role="alert" aria-live="assertive"></p>
            </div>

            <form id="phoneLoginForm" class="checkout-form phone-auth-form" novalidate>
                <h3 class="phone-auth-title"><span class="auth-logo phone-logo" aria-hidden="true">+63</span><span>Continue with Phone Number</span></h3>
                <label for="phoneNumber">Phone Number</label>
                <input id="phoneNumber" name="phone_number" placeholder="+639171234567" autocomplete="tel" />
                <label for="phoneCode">OTP Code</label>
                <input id="phoneCode" name="code" placeholder="6-digit code" inputmode="numeric" autocomplete="one-time-code" />
                <div class="phone-auth-actions">
                    <button id="requestPhoneCodeButton" class="btn secondary" type="button">Send Code</button>
                    <button id="verifyPhoneCodeButton" class="btn" type="submit">Verify & Sign In</button>
                </div>
                <p id="phoneAuthHint" class="meta"></p>
                <p id="phoneAuthError" class="inline-error" role="alert" aria-live="assertive"></p>
            </form>

            <div class="step-actions auth-actions">
                <a class="plain-btn" href="register.html?v=3">Create an account</a>
                <button id="logoutButton" class="btn secondary small hidden" type="button">Logout</button>
            </div>

            <p id="authStatus" class="status"></p>
        </section>
    </main>

    <div id="toastStack" class="toast-stack"></div>

    <script src="api.js?v=4"></script>
    <script src="auth-config.js?v=1"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script async defer crossorigin="anonymous" src="https://connect.facebook.net/en_US/sdk.js"></script>
    <script src="auth.js?v=6"></script>
</body>
</html>
