<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AnyPrint Store</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Sora:wght@400;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <header class="site-header">
        <div class="container nav-wrap">
            <h1>AnyPrint</h1>
            <div class="top-actions">
                <button id="authButton" class="auth-btn">Login/Register</button>
                <button id="cartButton" class="cart-btn">Cart (<span id="cartCount">0</span>)</button>
            </div>
        </div>
    </header>

    <main class="container">
        <section class="hero">
            <p class="eyebrow">Independent Frontend App</p>
            <h2>Premium T-Shirts Ready to Ship</h2>
            <p>Connected to a separate Django backend API for catalog, checkout, and payment redirects.</p>
        </section>

        <section>
            <div id="categoryChips" class="category-chips"></div>
            <div id="products" class="product-grid"></div>
        </section>
    </main>

    <aside id="cartPanel" class="cart-panel hidden">
        <div class="cart-head">
            <h3>Your Cart</h3>
            <button id="closeCart" class="plain-btn">Close</button>
        </div>
        <div id="cartItems"></div>
    </aside>

    <aside id="authPanel" class="auth-panel hidden">
        <div class="auth-dialog">
            <div class="cart-head">
                <h3>Account</h3>
                <button id="closeAuth" class="plain-btn">Close</button>
            </div>

            <div id="authState" class="auth-state"></div>

            <div class="auth-tabs">
                <button id="showLoginTab" class="chip active">Login</button>
                <button id="showRegisterTab" class="chip">Register</button>
            </div>

            <form id="loginForm" class="checkout-form">
                <h4>Login</h4>
                <input name="username" placeholder="Username" required />
                <input name="password" type="password" placeholder="Password" required />
                <button type="submit" class="btn">Login</button>
            </form>

            <form id="registerForm" class="checkout-form hidden">
                <h4>Register</h4>
                <input name="username" placeholder="Username" required />
                <input name="email" type="email" placeholder="Email (optional)" />
                <input name="password" type="password" placeholder="Password" required />
                <input name="confirm_password" type="password" placeholder="Confirm Password" required />
                <button type="submit" class="btn">Register</button>
            </form>

            <button id="logoutButton" class="plain-btn hidden">Logout</button>
            <p id="authStatus" class="status"></p>
        </div>
    </aside>

    <script src="app.js"></script>
</body>
</html>
