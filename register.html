<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Account - AnyPrint Store</title>
    <meta name="description" content="Create your AnyPrint account to start shopping for custom t-shirts and apparel." />
    <meta property="og:title" content="Create Account - AnyPrint Store" />
    <meta property="og:type" content="website" />
    <link rel="icon" href="data:;base64,iVBORw0KGgo=" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Sora:wght@400;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <header class="site-header">
        <div class="container nav-wrap">
            <div class="brand">
                <h1 class="brand-title"><a class="brand-link" href="index.html">AnyPrint</a></h1>
                <p class="brand-tag">Account</p>
            </div>
            <div class="top-actions">
                <a class="plain-btn" href="index.html">Back to Shop</a>
            </div>
        </div>
    </header>

    <main class="container page-shell checkout-page">
        <div class="page-intro">
            <p class="page-kicker">Create account</p>
            <h2 class="page-title">Register</h2>
            <p class="page-lead">Create an account to save your details, track orders, and checkout with less friction.</p>
        </div>

        <section class="checkout-card panel-card pad auth-card-shell">
            <h2>Register</h2>
            <div id="authState" class="auth-state"></div>

            <form id="registerForm" class="checkout-form" novalidate>
                <label for="registerUsername">Username</label>
                <input id="registerUsername" name="username" placeholder="Username" autocomplete="username" required />
                <p id="registerUsernameError" class="field-error"></p>
                <label for="registerEmail">Email</label>
                <input id="registerEmail" name="email" type="email" placeholder="Email (optional)" autocomplete="email" />
                <p id="registerEmailError" class="field-error"></p>
                <label for="registerPassword">Password</label>
                <input id="registerPassword" name="password" type="password" placeholder="Password" autocomplete="new-password" required />
                <p id="registerPasswordError" class="field-error"></p>
                <p id="passwordStrength" class="meta"></p>
                <label for="registerConfirmPassword">Confirm Password</label>
                <input id="registerConfirmPassword" name="confirm_password" type="password" placeholder="Confirm Password" autocomplete="new-password" required />
                <p id="registerConfirmError" class="field-error"></p>
                <p id="registerError" class="inline-error" role="alert" aria-live="assertive"></p>
                <button type="submit" class="btn">Create Account</button>
            </form>

            <div class="social-auth-shell">
                <p class="social-auth-divider"><span>or create account with</span></p>
                <div class="social-auth-actions">
                    <button id="googleLoginButton" class="btn social google provider-btn" type="button">
                        <span class="auth-logo google-logo" aria-hidden="true">G</span>
                        <span>Continue with Google</span>
                    </button>
                    <button id="facebookLoginButton" class="btn social facebook provider-btn" type="button">
                        <span class="auth-logo facebook-logo" aria-hidden="true">f</span>
                        <span>Continue with Facebook</span>
                    </button>
                    <button id="phoneDropdownButton" class="btn social phone provider-btn" type="button" aria-expanded="false" aria-controls="phoneLoginForm">
                        <span class="auth-logo phone-logo" aria-hidden="true">+63</span>
                        <span>Continue Using Phone Number</span>
                    </button>
                </div>
                <p id="socialAuthError" class="inline-error" role="alert" aria-live="assertive"></p>
            </div>

            <form id="phoneLoginForm" class="checkout-form phone-auth-form" novalidate style="display:none;">
                <h3 class="phone-auth-title"><span class="auth-logo phone-logo" aria-hidden="true">+63</span><span>Continue with Phone Number</span></h3>
                <label for="phoneNumber">Phone Number</label>
                <input id="phoneNumber" name="phone_number" placeholder="+639171234567" autocomplete="tel" />
                <label for="phoneCode">OTP Code</label>
                <input id="phoneCode" name="code" placeholder="6-digit code" inputmode="numeric" autocomplete="one-time-code" />
                <div class="phone-auth-actions">
                    <button id="requestPhoneCodeButton" class="btn secondary" type="button">Send Code</button>
                    <button id="verifyPhoneCodeButton" class="btn" type="submit">Verify & Create Account</button>
                </div>
                <p id="phoneAuthHint" class="meta"></p>
                <p id="phoneAuthError" class="inline-error" role="alert" aria-live="assertive"></p>
            </form>

            <div class="step-actions auth-actions">
                <a class="plain-btn" href="login.html?v=3">I already have an account</a>
                <button id="logoutButton" class="btn secondary small hidden" type="button">Logout</button>
            </div>

            <p id="authStatus" class="status"></p>
        </section>
    </main>

    <div id="toastStack" class="toast-stack"></div>

    <script src="api.js?v=4"></script>
    <script src="auth-config.js?v=1"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script async defer crossorigin="anonymous" src="https://connect.facebook.net/en_US/sdk.js"></script>
    <script src="auth.js?v=6"></script>
    <script>
        const registerAuthState = document.getElementById('authState');
        const registerFormElement = document.getElementById('registerForm');
        const loginFormElement = document.getElementById('loginForm');
        if (registerAuthState && registerFormElement && !loginFormElement) {
            const applyRegisterPrompt = () => {
                if (registerAuthState.textContent.includes('Sign in to continue.')) {
                    registerAuthState.innerHTML = '<p class="meta">Create an account to continue.</p>';
                }
            };

            applyRegisterPrompt();

            const observer = new MutationObserver(applyRegisterPrompt);
            observer.observe(registerAuthState, { childList: true, subtree: true, characterData: true });

            window.addEventListener('load', applyRegisterPrompt);
        }

        // Phone dropdown logic
        const phoneDropdownButton = document.getElementById('phoneDropdownButton');
        const phoneLoginForm = document.getElementById('phoneLoginForm');
        if (phoneDropdownButton && phoneLoginForm) {
            phoneDropdownButton.addEventListener('click', function() {
                const expanded = phoneDropdownButton.getAttribute('aria-expanded') === 'true';
                phoneLoginForm.style.display = expanded ? 'none' : 'block';
                phoneDropdownButton.setAttribute('aria-expanded', expanded ? 'false' : 'true');
                if (!expanded) {
                    phoneLoginForm.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            });
        }
    </script>
</body>
</html>
