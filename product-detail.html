<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reviews - Product</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .product-detail-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        .product-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            margin-bottom: 60px;
        }
        .product-image-gallery {
            background: #f5f5f5;
            border-radius: 8px;
            overflow: hidden;
        }
        .product-image-main {
            width: 100%;
            height: 400px;
            object-fit: cover;
        }
        .product-info {
            padding: 20px 0;
        }
        .product-title {
            font-size: 32px;
            font-weight: 700;
            margin: 0 0 15px;
        }
        .product-rating {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }
        .rating-stars {
            font-size: 20px;
            color: #f57f17;
        }
        .rating-text {
            color: #666;
            font-size: 14px;
        }
        .product-price {
            font-size: 28px;
            font-weight: 700;
            margin: 20px 0;
        }
        .product-description {
            color: #666;
            line-height: 1.6;
            margin-bottom: 20px;
        }
        .reviews-section {
            background: #fff;
            padding: 40px;
            border-radius: 8px;
            border: 1px solid #ddd;
        }
        .reviews-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 20px;
        }
        .rating-distribution {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
        }
        .rating-bar {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 12px;
        }
        .rating-stars-small {
            min-width: 80px;
            font-size: 14px;
            color: #f57f17;
        }
        .bar-container {
            flex: 1;
            background: #e0e0e0;
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
        }
        .bar-fill {
            background: #f57f17;
            height: 100%;
            border-radius: 4px;
        }
        .bar-count {
            min-width: 60px;
            text-align: right;
            color: #666;
            font-size: 14px;
        }
        .review-form {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-family: inherit;
        }
        .star-rating {
            display: flex;
            gap: 10px;
            font-size: 28px;
            margin-bottom: 15px;
        }
        .star {
            cursor: pointer;
            color: #ddd;
            transition: color 0.2s;
        }
        .star.active {
            color: #f57f17;
        }
        .review-item {
            padding: 20px;
            border-bottom: 1px solid #eee;
            margin-bottom: 20px;
        }
        .review-item:last-child {
            border-bottom: none;
        }
        .review-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .review-author {
            font-weight: 600;
            color: #333;
        }
        .review-date {
            color: #999;
            font-size: 14px;
        }
        .review-rating {
            color: #f57f17;
            margin-bottom: 10px;
        }
        .review-title {
            font-weight: 600;
            margin-bottom: 8px;
        }
        .review-text {
            color: #666;
            line-height: 1.6;
        }
        .empty-reviews {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <a href="index.html" class="logo">AnyPrint</a>
            <nav class="nav">
                <a href="index.html">Home</a>
                <a href="shop.html">Shop</a>
                <a href="account.html">My Account</a>
                <button class="btn-icon" onclick="toggleCart()">🛒</button>
            </nav>
        </div>
    </header>

    <div class="product-detail-container">
        <!-- Product Info Section -->
        <div class="product-section">
            <div class="product-image-gallery">
                <img id="mainImage" src="" alt="Product" class="product-image-main">
            </div>
            <div class="product-info">
                <h1 class="product-title" id="productName">Product Name</h1>
                <div class="product-rating">
                    <div class="rating-stars" id="productRating">☆☆☆☆☆</div>
                    <div class="rating-text">
                        <span id="avgRating">0</span>/5 
                        (<span id="reviewCount">0</span> reviews)
                    </div>
                </div>
                <div class="product-price" id="productPrice">$0.00</div>
                <div class="product-description" id="productDescription">Loading...</div>
                
                <div style="margin-top: 30px;">
                    <button class="btn" onclick="addToCart()" style="width: 100%; padding: 15px; margin-bottom: 10px;">Add to Cart</button>
                    <button class="btn" style="width: 100%; padding: 15px; background: #fff; border: 2px solid #000; color: #000; margin-bottom: 10px;" onclick="toggleWishlist()">♥ Add to Wishlist</button>
                    <button class="btn" style="width: 100%; padding: 15px; background: #f0f0f0; border: 1px solid #ddd; color: #000;" onclick="shareProduct()">Share Product</button>
                </div>
            </div>
        </div>

        <!-- Reviews Section -->
        <div class="reviews-section">
            <div class="reviews-header">
                <h2 style="margin: 0;">Customer Reviews</h2>
                <button class="btn" onclick="scrollToReviewForm()">Write a Review</button>
            </div>

            <!-- Rating Distribution -->
            <div class="rating-distribution" id="ratingDistribution"></div>

            <!-- Review Form -->
            <div class="review-form" id="reviewFormContainer" style="display: none;">
                <h3 style="margin-top: 0;">Share Your Review</h3>
                <form id="reviewForm" onsubmit="submitReview(event)">
                    <div class="form-group">
                        <label>Rating</label>
                        <div class="star-rating" id="starRating">
                            <span class="star" onclick="setRating(1)">★</span>
                            <span class="star" onclick="setRating(2)">★</span>
                            <span class="star" onclick="setRating(3)">★</span>
                            <span class="star" onclick="setRating(4)">★</span>
                            <span class="star" onclick="setRating(5)">★</span>
                        </div>
                        <input type="hidden" id="ratingValue" name="rating" value="0" required>
                    </div>
                    <div class="form-group">
                        <label>Review Title</label>
                        <input type="text" name="title" placeholder="e.g., Great quality!" required>
                    </div>
                    <div class="form-group">
                        <label>Your Review</label>
                        <textarea name="comment" placeholder="Share your experience with this product..." rows="5" required></textarea>
                    </div>
                    <button type="submit" class="btn">Submit Review</button>
                </form>
            </div>

            <!-- Reviews List -->
            <div id="reviewsList"></div>
        </div>
    </div>

    <script src="common.js"></script>
    <script>
        const { API_BASE, apiFetch, formatPrice, renderStars, getCurrentUser, showToast, loadCart, saveCart } = window.AnyPrint;
        
        let productData = null;
        let currentRating = 0;
        let userCanReview = false;

        async function initProduct() {
            const params = new URLSearchParams(window.location.search);
            const slug = params.get('slug');
            
            if (!slug) {
                document.body.innerHTML = '<div style="padding: 100px 20px; text-align: center;"><h2>Product not found</h2><a href="shop.html">Back to shop</a></div>';
                return;
            }
            
            try {
                const response = await apiFetch(`${API_BASE}/products/${slug}/`);
                if (response.ok) {
                    productData = await response.json();
                    displayProduct();
                    loadReviews();
                    checkUserReviewPermission();
                }
            } catch (error) {
                console.error('Failed to load product:', error);
                showToast('Failed to load product', 'error');
            }
        }

        function displayProduct() {
            document.getElementById('productName').textContent = productData.name;
            document.getElementById('mainImage').src = productData.image_url;
            document.getElementById('productPrice').textContent = formatPrice(productData.price);
            document.getElementById('productDescription').textContent = productData.description;
            document.getElementById('productRating').innerHTML = renderStars(productData.average_rating || 0);
            document.getElementById('avgRating').textContent = (productData.average_rating || 0).toFixed(1);
            document.getElementById('reviewCount').textContent = productData.review_count || 0;
        }

        async function loadReviews() {
            try {
                const slug = new URLSearchParams(window.location.search).get('slug');
                const response = await apiFetch(`${API_BASE}/products/${slug}/reviews/`);
                
                if (response.ok) {
                    const data = await response.json();
                    const reviews = data.reviews || [];
                    
                    // Calculate rating distribution
                    const distribution = { 5: 0, 4: 0, 3: 0, 2: 0, 1: 0 };
                    reviews.forEach(review => {
                        if (review.rating in distribution) {
                            distribution[review.rating]++;
                        }
                    });
                    
                    const totalReviews = reviews.length;
                    let ratingHtml = '';
                    for (let i = 5; i >= 1; i--) {
                        const count = distribution[i];
                        const percentage = totalReviews > 0 ? (count / totalReviews) * 100 : 0;
                        ratingHtml += `
                            <div class="rating-bar">
                                <div class="rating-stars-small">${renderStars(i)}</div>
                                <div class="bar-container">
                                    <div class="bar-fill" style="width: ${percentage}%"></div>
                                </div>
                                <div class="bar-count">${count}</div>
                            </div>
                        `;
                    }
                    document.getElementById('ratingDistribution').innerHTML = ratingHtml;
                    
                    // Display reviews
                    let reviewsHtml = '';
                    if (reviews.length === 0) {
                        reviewsHtml = '<div class="empty-reviews"><p>No reviews yet. Be the first to review this product!</p></div>';
                    } else {
                        reviews.forEach(review => {
                            reviewsHtml += `
                                <div class="review-item">
                                    <div class="review-header">
                                        <div>
                                            <div class="review-author">${review.user_name}</div>
                                            <div class="review-date">${new Date(review.created_at).toLocaleDateString()}</div>
                                        </div>
                                    </div>
                                    <div class="review-rating">${renderStars(review.rating)}</div>
                                    <div class="review-title">${review.title}</div>
                                    <div class="review-text">${review.comment}</div>
                                </div>
                            `;
                        });
                    }
                    document.getElementById('reviewsList').innerHTML = reviewsHtml;
                }
            } catch (error) {
                console.error('Failed to load reviews:', error);
            }
        }

        function checkUserReviewPermission() {
            const user = window.AnyPrint.getCurrentUser();
            userCanReview = !!user;
            
            if (userCanReview) {
                document.getElementById('reviewFormContainer').style.display = 'block';
            }
        }

        function setRating(rating) {
            currentRating = rating;
            document.getElementById('ratingValue').value = rating;
            
            const stars = document.querySelectorAll('.star-rating .star');
            stars.forEach((star, index) => {
                if (index < rating) {
                    star.classList.add('active');
                } else {
                    star.classList.remove('active');
                }
            });
        }

        async function submitReview(event) {
            event.preventDefault();
            
            if (currentRating === 0) {
                showToast('Please select a rating', 'error');
                return;
            }
            
            const formData = new FormData(event.target);
            const slug = new URLSearchParams(window.location.search).get('slug');
            
            try {
                const response = await apiFetch(`${API_BASE}/products/${slug}/reviews/create/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        rating: currentRating,
                        title: formData.get('title'),
                        comment: formData.get('comment'),
                    }),
                });
                
                if (response.ok) {
                    showToast('Review submitted successfully! It will appear after moderation.', 'success');
                    event.target.reset();
                    setRating(0);
                    loadReviews();
                } else {
                    showToast('Failed to submit review', 'error');
                }
            } catch (error) {
                console.error('Failed to submit review:', error);
                showToast('Error submitting review', 'error');
            }
        }

        function scrollToReviewForm() {
            if (!userCanReview) {
                window.location.href = 'login.html';
                return;
            }
            document.getElementById('reviewFormContainer').scrollIntoView({ behavior: 'smooth' });
        }

        function addToCart() {
            const cart = window.AnyPrint.loadCart();
            const variant = productData.variants && productData.variants[0];
            
            if (!variant) {
                showToast('Product variants not available', 'error');
                return;
            }
            
            const item = {
                key: `${productData.id}_${variant.size}_${variant.color}`,
                product_id: productData.id,
                variant_id: variant.id,
                product_name: productData.name,
                size: variant.size,
                color: variant.color,
                unit_price: parseFloat(productData.price),
                quantity: 1,
                image_url: productData.image_url,
            };
            
            const existing = cart.find(c => c.key === item.key);
            if (existing) {
                existing.quantity += 1;
            } else {
                cart.push(item);
            }
            
            window.AnyPrint.saveCart(cart);
            showToast('Added to cart!', 'success');
        }

        function toggleWishlist() {
            apiFetch(`${API_BASE}/wishlist/toggle/`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ product_id: productData.id }),
            }).then(res => {
                if (res.ok) {
                    showToast('Added to wishlist', 'success');
                }
            });
        }

        function shareProduct() {
            const url = window.location.href;
            if (navigator.share) {
                navigator.share({
                    title: productData.name,
                    url: url,
                });
            } else {
                navigator.clipboard.writeText(url);
                showToast('Product link copied to clipboard', 'success');
            }
        }

        function toggleCart() {
            window.location.href = 'checkout-new.html';
        }

        document.addEventListener('DOMContentLoaded', initProduct);
    </script>
</body>
</html>
