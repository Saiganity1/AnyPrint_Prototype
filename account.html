<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Account - AnyPrint</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .account-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        .account-header {
            margin-bottom: 40px;
            border-bottom: 2px solid #eee;
            padding-bottom: 20px;
        }
        .account-tabs {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            border-bottom: 1px solid #eee;
        }
        .tab-button {
            padding: 10px 20px;
            background: none;
            border: none;
            border-bottom: 3px solid transparent;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.2s;
        }
        .tab-button.active {
            border-bottom-color: #000;
            font-weight: 600;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        .order-card {
            background: #fff;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .order-status {
            padding: 6px 12px;
            background: #f0f0f0;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 600;
        }
        .order-items {
            border-top: 1px solid #eee;
            padding-top: 15px;
            margin-top: 15px;
        }
        .item-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        .item-name {
            flex: 1;
        }
        .item-qty {
            width: 100px;
            text-align: center;
        }
        .item-price {
            width: 100px;
            text-align: right;
        }
        .address-form {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
        }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-family: inherit;
        }
        .wishlist-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <a href="index.html" class="logo">AnyPrint</a>
            <nav class="nav">
                <a href="index.html">Home</a>
                <a href="shop.html">Shop</a>
                <a href="account.html" class="active">My Account</a>
                <a href="checkout.html">Checkout</a>
                <button class="btn-icon" onclick="logout()">Logout</button>
            </nav>
        </div>
    </header>

    <div class="account-container">
        <div class="account-header">
            <h1>My Account</h1>
            <p>Welcome, <span id="userName">User</span></p>
        </div>

        <div class="account-tabs">
            <button class="tab-button active" onclick="switchTab('orders')">Order History</button>
            <button class="tab-button" onclick="switchTab('addresses')">Saved Addresses</button>
            <button class="tab-button" onclick="switchTab('wishlist')">Wishlist</button>
            <button class="tab-button" onclick="switchTab('profile')">Profile Settings</button>
        </div>

        <!-- Orders Tab -->
        <div id="orders" class="tab-content active">
            <h2>Order History</h2>
            <div id="ordersList"></div>
        </div>

        <!-- Addresses Tab -->
        <div id="addresses" class="tab-content">
            <h2>Saved Addresses</h2>
            <div id="addressesList"></div>
            <div class="address-form">
                <h3>Add New Address</h3>
                <form id="addressForm" onsubmit="saveAddress(event)">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" name="full_name" required>
                    </div>
                    <div class="form-group">
                        <label>Phone</label>
                        <input type="tel" name="phone" required>
                    </div>
                    <div class="form-group">
                        <label>Address</label>
                        <textarea name="address" rows="4" required></textarea>
                    </div>
                    <button type="submit" class="btn">Save Address</button>
                </form>
            </div>
        </div>

        <!-- Wishlist Tab -->
        <div id="wishlist" class="tab-content">
            <h2>My Wishlist</h2>
            <div id="wishlistList" class="wishlist-grid"></div>
        </div>

        <!-- Profile Tab -->
        <div id="profile" class="tab-content">
            <h2>Profile Settings</h2>
            <div class="address-form">
                <form id="profileForm" onsubmit="saveProfile(event)">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="profileEmail" readonly>
                    </div>
                    <div class="form-group">
                        <label>Display Name</label>
                        <input type="text" name="display_name" id="profileName">
                    </div>
                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="tel" name="phone_number" id="profilePhone">
                    </div>
                    <button type="submit" class="btn">Update Profile</button>
                </form>
            </div>
        </div>
    </div>

    <script src="common.js"></script>
    <script src="account.js"></script>
</body>
</html>
