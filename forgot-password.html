<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password - AnyPrint Store</title>
    <meta name="description" content="Reset your AnyPrint account password." />
    <meta property="og:title" content="Forgot Password - AnyPrint Store" />
    <meta property="og:type" content="website" />
    <link rel="icon" href="data:;base64,iVBORw0KGgo=" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Sora:wght@400;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <header class="site-header">
        <div class="container nav-wrap">
            <div class="brand">
                <h1 class="brand-title">AnyPrint</h1>
                <p class="brand-tag">T-shirt Store</p>
            </div>
            <nav class="top-links" aria-label="Primary">
                <a class="plain-btn" href="index.html">Home</a>
                <a class="plain-btn" href="shop.html">All Products</a>
                <a class="plain-btn" href="about.html">About Us</a>
            </nav>
            <div class="top-actions">
                <a class="auth-btn" href="login.html">Login</a>
                <a class="auth-btn" href="register.html">Register</a>
            </div>
        </div>
    </header>

    <main class="auth-page">
        <div class="container">
            <div class="auth-card">
                <div id="requestSection">
                    <h2 class="page-title">Reset Password</h2>
                    <p class="auth-subtitle">Enter your email address and we'll send you a link to reset your password.</p>
                    
                    <form id="resetRequestForm" class="checkout-form" novalidate>
                        <label for="resetEmail">Email Address</label>
                        <input id="resetEmail" name="email" type="email" placeholder="your@email.com" autocomplete="email" required />
                        <p id="resetEmailError" class="field-error"></p>
                        <p id="resetError" class="inline-error" role="alert" aria-live="assertive"></p>
                        <p id="resetSuccess" class="inline-success" role="status" aria-live="polite"></p>
                        <button type="submit" class="btn">Send Reset Link</button>
                    </form>
                    
                    <p class="auth-footer">Remember your password? <a href="login.html">Login here</a></p>
                </div>

                <div id="resetSection" class="hidden">
                    <h2 class="page-title">Create New Password</h2>
                    <p class="auth-subtitle">Enter your new password below.</p>
                    
                    <form id="resetConfirmForm" class="checkout-form" novalidate>
                        <input type="hidden" id="resetUserId" name="user_id" />
                        <input type="hidden" id="resetToken" name="token" />
                        
                        <label for="newPassword">New Password</label>
                        <input id="newPassword" name="new_password" type="password" placeholder="At least 8 characters" autocomplete="new-password" required />
                        <p id="newPasswordError" class="field-error"></p>
                        
                        <label for="confirmPassword">Confirm Password</label>
                        <input id="confirmPassword" name="confirm_password" type="password" placeholder="Confirm your password" autocomplete="new-password" required />
                        <p id="confirmPasswordError" class="field-error"></p>
                        
                        <p id="resetConfirmError" class="inline-error" role="alert" aria-live="assertive"></p>
                        <p id="resetConfirmSuccess" class="inline-success" role="status" aria-live="polite"></p>
                        <button type="submit" class="btn">Reset Password</button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
    <script>
    const { API_BASE, apiFetch, showToast } = window.AnyPrint;

    // Check URL params for reset mode
    const urlParams = new URLSearchParams(window.location.search);
    const userId = urlParams.get('user_id');
    const token = urlParams.get('token');

    if (userId && token) {
        // Show reset form
        document.getElementById('requestSection').classList.add('hidden');
        document.getElementById('resetSection').classList.remove('hidden');
        document.getElementById('resetUserId').value = userId;
        document.getElementById('resetToken').value = token;
    }

    // Handle reset request form
    document.getElementById('resetRequestForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('resetEmail').value.trim();
        const errorEl = document.getElementById('resetError');
        const successEl = document.getElementById('resetSuccess');
        const btn = e.target.querySelector('button[type="submit"]');

        errorEl.textContent = '';
        successEl.textContent = '';

        if (!email) {
            errorEl.textContent = 'Please enter your email address.';
            return;
        }

        // Show loading
        btn.disabled = true;
        btn.textContent = 'Sending...';

        try {
            const response = await apiFetch(`${API_BASE}/auth/password/reset/request/`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email }),
            });
            const body = await response.json();
            
            if (response.ok) {
                successEl.textContent = 'If an account with that email exists, a reset link has been sent.';
                document.getElementById('resetEmail').value = '';
            } else {
                errorEl.textContent = body.error || 'Failed to send reset email.';
            }
        } catch (err) {
            errorEl.textContent = 'An error occurred. Please try again.';
        } finally {
            btn.disabled = false;
            btn.textContent = 'Send Reset Link';
        }
    });

    // Handle reset confirm form
    document.getElementById('resetConfirmForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const userId = document.getElementById('resetUserId').value;
        const token = document.getElementById('resetToken').value;
        const newPassword = document.getElementById('newPassword').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        const errorEl = document.getElementById('resetConfirmError');
        const successEl = document.getElementById('resetConfirmSuccess');
        const btn = e.target.querySelector('button[type="submit"]');

        errorEl.textContent = '';
        successEl.textContent = '';

        if (newPassword.length < 8) {
            errorEl.textContent = 'Password must be at least 8 characters.';
            return;
        }

        if (newPassword !== confirmPassword) {
            errorEl.textContent = 'Passwords do not match.';
            return;
        }

        // Show loading
        btn.disabled = true;
        btn.textContent = 'Resetting...';

        try {
            const response = await apiFetch(`${API_BASE}/auth/password/reset/confirm/`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user_id: userId, token, new_password: newPassword }),
            });
            const body = await response.json();
            
            if (response.ok) {
                successEl.textContent = 'Password reset successful! Redirecting to login...';
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);
            } else {
                errorEl.textContent = body.error || 'Failed to reset password.';
            }
        } catch (err) {
            errorEl.textContent = 'An error occurred. Please try again.';
        } finally {
            btn.disabled = false;
            btn.textContent = 'Reset Password';
        }
    });
    </script>
</body>
</html>
