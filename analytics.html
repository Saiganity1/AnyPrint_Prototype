<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics Dashboard - AnyPrint</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .analytics-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        .analytics-header {
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .date-range {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .date-range input {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .metric-card {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #ddd;
        }
        .metric-label {
            color: #666;
            font-size: 14px;
            margin-bottom: 10px;
        }
        .metric-value {
            font-size: 28px;
            font-weight: 700;
            color: #000;
        }
        .metric-change {
            font-size: 12px;
            color: #4caf50;
            margin-top: 5px;
        }
        .chart-container {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #ddd;
            margin-bottom: 20px;
        }
        .chart-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
        }
        .payment-breakdown {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        .payment-item {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 8px;
        }
        .payment-method {
            font-weight: 600;
            margin-bottom: 5px;
        }
        .payment-stats {
            font-size: 14px;
            color: #666;
        }
        .top-products {
            margin-top: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        th {
            background: #f5f5f5;
            font-weight: 600;
        }
        tr:hover {
            background: #f9f9f9;
        }
        .status-badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
        }
        .status-completed {
            background: #c8e6c9;
            color: #2e7d32;
        }
        .status-pending {
            background: #fff9c4;
            color: #f57f17;
        }
        .daily-chart {
            display: flex;
            align-items: flex-end;
            gap: 5px;
            height: 200px;
            margin-top: 20px;
        }
        .bar-item {
            flex: 1;
            background: #1976d2;
            border-radius: 4px 4px 0 0;
            position: relative;
            min-height: 5px;
        }
        .bar-label {
            position: absolute;
            bottom: -25px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 11px;
            color: #666;
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <a href="index.html" class="logo">AnyPrint</a>
            <nav class="nav">
                <a href="owner-dashboard.html">Dashboard</a>
                <a href="analytics.html" class="active">Analytics</a>
                <button class="btn-icon" onclick="logout()">Logout</button>
            </nav>
        </div>
    </header>

    <div class="analytics-container">
        <div class="analytics-header">
            <h1>Sales Analytics</h1>
            <div class="date-range">
                <input type="date" id="dateFrom" onchange="loadAnalytics()">
                <span>to</span>
                <input type="date" id="dateTo" onchange="loadAnalytics()">
                <button class="btn" onclick="resetDateRange()">Reset</button>
            </div>
        </div>

        <!-- Key Metrics -->
        <div class="metrics-grid">
            <div class="metric-card">
                <div class="metric-label">Total Revenue</div>
                <div class="metric-value" id="totalRevenue">$0.00</div>
            </div>
            <div class="metric-card">
                <div class="metric-label">Total Orders</div>
                <div class="metric-value" id="totalOrders">0</div>
            </div>
            <div class="metric-card">
                <div class="metric-label">Completed Orders</div>
                <div class="metric-value" id="completedOrders">0</div>
            </div>
            <div class="metric-card">
                <div class="metric-label">Average Order Value</div>
                <div class="metric-value" id="avgOrderValue">$0.00</div>
            </div>
        </div>

        <!-- Payment Method Breakdown -->
        <div class="chart-container">
            <div class="chart-title">Payment Methods</div>
            <div class="payment-breakdown" id="paymentBreakdown"></div>
        </div>

        <!-- Order Status Breakdown -->
        <div class="chart-container">
            <div class="chart-title">Order Status Distribution</div>
            <div id="statusBreakdown"></div>
        </div>

        <!-- Daily Sales Trend -->
        <div class="chart-container">
            <div class="chart-title">Daily Sales Trend (Last 30 Days)</div>
            <div class="daily-chart" id="dailySalesChart"></div>
        </div>

        <!-- Top Products -->
        <div class="chart-container">
            <div class="chart-title">Top Selling Products</div>
            <table id="topProductsTable">
                <thead>
                    <tr>
                        <th>Product Name</th>
                        <th>Quantity Sold</th>
                        <th>Revenue</th>
                    </tr>
                </thead>
                <tbody id="topProductsBody"></tbody>
            </table>
        </div>
    </div>

    <script src="common.js"></script>
    <script>
        const { API_BASE, apiFetch, formatPrice, getCurrentUser } = window.AnyPrint;

        async function initAnalytics() {
            const user = window.AnyPrint.getCurrentUser();
            if (!user || !['OWNER', 'ADMIN'].includes(user.role)) {
                window.location.href = 'login.html';
                return;
            }

            // Set default date range (last 30 days)
            const today = new Date();
            const thirtyDaysAgo = new Date(today.getTime() - 30 * 24 * 60 * 60 * 1000);
            
            document.getElementById('dateFrom').value = thirtyDaysAgo.toISOString().split('T')[0];
            document.getElementById('dateTo').value = today.toISOString().split('T')[0];

            loadAnalytics();
        }

        async function loadAnalytics() {
            const dateFrom = document.getElementById('dateFrom').value;
            const dateTo = document.getElementById('dateTo').value;

            try {
                const response = await apiFetch(`${API_BASE}/admin/analytics/?date_from=${dateFrom}&date_to=${dateTo}`);
                
                if (response.ok) {
                    const data = await response.json();
                    displayMetrics(data.metrics);
                    displayPaymentBreakdown(data.payment_breakdown);
                    displayStatusBreakdown(data.status_breakdown);
                    displayTopProducts(data.top_products);
                    displayDailySalesTrend(data.daily_sales);
                }
            } catch (error) {
                console.error('Failed to load analytics:', error);
            }
        }

        function displayMetrics(metrics) {
            document.getElementById('totalRevenue').textContent = formatPrice(metrics.total_revenue);
            document.getElementById('totalOrders').textContent = metrics.total_orders;
            document.getElementById('completedOrders').textContent = metrics.completed_orders;
            document.getElementById('avgOrderValue').textContent = formatPrice(metrics.average_order_value);
        }

        function displayPaymentBreakdown(breakdown) {
            let html = '';
            breakdown.forEach(item => {
                html += `
                    <div class="payment-item">
                        <div class="payment-method">${item.payment_method}</div>
                        <div class="payment-stats">${item.count} orders</div>
                        <div class="payment-stats">${formatPrice(item.total)}</div>
                    </div>
                `;
            });
            document.getElementById('paymentBreakdown').innerHTML = html;
        }

        function displayStatusBreakdown(breakdown) {
            let html = '<div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px;">';
            breakdown.forEach(item => {
                html += `
                    <div style="background: #f9f9f9; padding: 15px; border-radius: 8px;">
                        <div style="font-weight: 600; margin-bottom: 5px;">${item.status}</div>
                        <div style="font-size: 24px; font-weight: 700;">${item.count}</div>
                    </div>
                `;
            });
            html += '</div>';
            document.getElementById('statusBreakdown').innerHTML = html;
        }

        function displayTopProducts(products) {
            let html = '';
            products.forEach(product => {
                html += `
                    <tr>
                        <td>${product.product__name}</td>
                        <td>${product.quantity_sold}</td>
                        <td>${formatPrice(product.revenue)}</td>
                    </tr>
                `;
            });
            document.getElementById('topProductsBody').innerHTML = html;
        }

        function displayDailySalesTrend(dailySales) {
            if (dailySales.length === 0) return;

            const maxRevenue = Math.max(...dailySales.map(d => parseFloat(d.revenue) || 0));
            let html = '';

            dailySales.forEach((item, index) => {
                const revenue = parseFloat(item.revenue) || 0;
                const height = maxRevenue > 0 ? (revenue / maxRevenue) * 100 : 0;
                const date = new Date(item.date);
                const label = (date.getMonth() + 1) + '/' + date.getDate();

                html += `
                    <div class="bar-item" style="height: calc(10px + ${height * 1.9}px);">
                        <div class="bar-label">${label}</div>
                    </div>
                `;
            });

            document.getElementById('dailySalesChart').innerHTML = html;
        }

        function resetDateRange() {
            const today = new Date();
            const thirtyDaysAgo = new Date(today.getTime() - 30 * 24 * 60 * 60 * 1000);
            
            document.getElementById('dateFrom').value = thirtyDaysAgo.toISOString().split('T')[0];
            document.getElementById('dateTo').value = today.toISOString().split('T')[0];
            
            loadAnalytics();
        }

        function logout() {
            window.AnyPrint.clearAuthToken();
            window.location.href = 'index.html';
        }

        document.addEventListener('DOMContentLoaded', initAnalytics);
    </script>
</body>
</html>
