<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AnyPrint Owner Dashboard</title>
    <link rel="icon" href="data:;base64,iVBORw0KGgo=" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Sora:wght@400;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
    <style>
        .owner-grid { display: grid; gap: 16px; }
        .owner-quick { display: grid; gap: 12px; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); }
        .owner-card { border: 1px solid rgba(0,0,0,.08); border-radius: 12px; padding: 16px; background: #fff; }
        .owner-card h3 { margin: 0 0 8px; }
        .owner-kpi { font-size: 1.7rem; font-weight: 700; }
        .owner-form { display: grid; gap: 10px; }
        .owner-form-grid { display: grid; gap: 10px; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); }
        .owner-table { width: 100%; border-collapse: collapse; }
        .owner-table th, .owner-table td { border-bottom: 1px solid #eceff4; padding: 10px; text-align: left; }
        .owner-stock-actions { display: grid; gap: 6px; grid-template-columns: 92px 100px 110px; }
    </style>
</head>
<body>
    <header class="site-header">
        <div class="container nav-wrap">
            <div class="brand">
                <h1 class="brand-title"><a class="brand-link" href="index.html">AnyPrint</a></h1>
                <p class="brand-tag">Owner homepage</p>
            </div>
            <div class="top-actions">
                <a class="plain-btn" href="shop.html">View Shop</a>
                <a class="plain-btn" href="admin.html">Admin</a>
                <button id="ownerLogoutButton" class="btn secondary small" type="button">Logout</button>
            </div>
        </div>
    </header>

    <main class="container page-shell checkout-page">
        <div class="page-intro">
            <p class="page-kicker">Owner</p>
            <h2 class="page-title">Analytics and inventory control</h2>
            <p class="page-lead">Track revenue, watch product performance, add new items, and restock inventory quickly.</p>
        </div>

        <p id="ownerStatus" class="status"></p>

        <section class="owner-grid">
            <div id="ownerKpis" class="owner-quick"></div>

            <section class="owner-card">
                <h3>Add Product</h3>
                <form id="ownerCreateProductForm" class="owner-form" novalidate>
                    <div class="owner-form-grid">
                        <input name="name" placeholder="Product name" required />
                        <input name="category" placeholder="Category" />
                        <input name="price" type="number" min="1" step="0.01" placeholder="Price" required />
                        <input name="stock_quantity" type="number" min="0" step="1" placeholder="Initial stock" required />
                        <select name="print_style" aria-label="Print style" title="Print style">
                            <option value="Classic">Classic</option>
                            <option value="Minimal">Minimal</option>
                            <option value="Graphic">Graphic</option>
                            <option value="Street">Street</option>
                            <option value="Kids">Kids</option>
                        </select>
                    </div>
                    <div class="owner-form-row">
                        <label for="productImage" class="file-upload-label">Product Image (optional)</label>
                        <input id="productImage" name="image" type="file" accept="image/*" />
                        <p class="field-hint">Supported: JPG, PNG, GIF, WebP (max 5MB)</p>
                    </div>
                    <textarea name="description" rows="3" placeholder="Description"></textarea>
                    <label><input name="is_featured" type="checkbox" /> Featured product</label>
                    <button type="submit" class="btn">Create Product</button>
                </form>
            </section>

            <section class="owner-card">
                <h3>Sales Snapshot</h3>
                <div id="ownerAnalyticsSummary" class="table-stack"></div>
            </section>

            <section class="owner-card">
                <h3>Recent Orders</h3>
                <div class="owner-form-grid owner-orders-filter-row">
                    <input id="ownerOrderSearch" type="search" placeholder="Search by customer, tracking, ID, payment" aria-label="Search owner recent orders" />
                    <select id="ownerOrderStatusFilter" aria-label="Filter owner recent orders by status" title="Filter owner recent orders by status">
                        <option value="">All statuses</option>
                        <option value="PENDING">Pending</option>
                        <option value="CONFIRMED">Confirmed</option>
                        <option value="PACKED">Packed</option>
                        <option value="SHIPPED">Shipped</option>
                        <option value="OUT_FOR_DELIVERY">Out for delivery</option>
                        <option value="DELIVERED">Delivered</option>
                        <option value="CANCELLED">Cancelled</option>
                    </select>
                </div>
                <div id="ownerRecentOrdersList" class="table-stack"></div>
            </section>

            <section class="owner-card">
                <h3>Products and Restock</h3>
                <div id="ownerProductsTable"></div>
            </section>
        </section>
    </main>

    <div id="toastStack" class="toast-stack"></div>

    <script src="api.js?v=4"></script>
    <script src="common.js?v=4"></script>
    <script src="owner-dashboard.js?v=2"></script>
</body>
</html>
